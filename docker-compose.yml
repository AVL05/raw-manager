version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: raw_manager_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - app-data:/var/www/public
    networks:
      - raw-network
    depends_on:
      - db
    environment:
      - PHP_OPCACHE_ENABLE=1

  nginx:
    image: nginx:alpine
    container_name: raw_manager_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - app-data:/var/www/public
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - raw-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: raw_manager_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: raw_manager
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: raw_manager
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - raw-network
    command: --default-authentication-plugin=mysql_native_password

  frontend:
    image: node:20-alpine
    container_name: raw_manager_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - raw-network
    environment:
      - CHOKIDAR_USEPOLLING=true

networks:
  raw-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  app-data:
    driver: local
