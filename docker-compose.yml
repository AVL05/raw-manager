services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: raw_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - app-storage:/var/www/storage/app/public
    networks:
      - raw-network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: raw_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - app-storage:/var/www/storage/app/public
    networks:
      - raw-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: raw_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: raw_manager
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: raw_manager
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - raw-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "raw_manager", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-alpine
    container_name: raw_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    networks:
      - raw-network

volumes:
  mysql-data:
  app-storage:

networks:
  raw-network:
    driver: bridge
