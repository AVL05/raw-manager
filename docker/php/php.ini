; Custom PHP configuration for RAW Manager

[PHP]
; File upload settings - photographers upload large RAW/JPEG files
upload_max_filesize = 50M
post_max_size = 50M
max_execution_time = 300
max_input_time = 300
memory_limit = 256M

; Error reporting
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; Date/Time
date.timezone = UTC

; Session
session.gc_maxlifetime = 7200

; Opcache (improves performance)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
