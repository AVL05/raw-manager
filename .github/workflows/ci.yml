name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests (PHP 8.2)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: raw_manager_test
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_USER: raw_manager
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, bcmath, gd, zip

      - name: Install Composer dependencies
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        working-directory: ./backend
        run: cp .env.example .env.testing

      - name: Configure test env
        working-directory: ./backend
        run: |
          sed -i 's/DB_HOST=db/DB_HOST=127.0.0.1/' .env.testing
          sed -i 's/DB_DATABASE=raw_manager/DB_DATABASE=raw_manager_test/' .env.testing

      - name: Generate app key
        working-directory: ./backend
        run: php artisan key:generate --env=testing

      - name: Run migrations
        working-directory: ./backend
        run: php artisan migrate --env=testing --force

      - name: Run tests
        working-directory: ./backend
        run: php artisan test

  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost/api
          VITE_APP_NAME: RAW Manager