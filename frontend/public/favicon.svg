<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo negro redondeado -->
  <rect width="64" height="64" rx="14" fill="#09090b"/>

  <!-- Diafragma de cámara: 6 aspas giradas -->
  <g transform="translate(32,32)">
    <!-- Aro exterior -->
    <circle r="27" fill="none" stroke="#52525b" stroke-width="1.5"/>

    <!-- 6 aspas del diafragma (elipses rotadas) -->
    <ellipse rx="7.5" ry="20" fill="#f4f4f5" transform="rotate(0)"   opacity="0.92"/>
    <ellipse rx="7.5" ry="20" fill="#f4f4f5" transform="rotate(60)"  opacity="0.92"/>
    <ellipse rx="7.5" ry="20" fill="#f4f4f5" transform="rotate(120)" opacity="0.92"/>
    <ellipse rx="7.5" ry="20" fill="#f4f4f5" transform="rotate(180)" opacity="0.92"/>
    <ellipse rx="7.5" ry="20" fill="#f4f4f5" transform="rotate(240)" opacity="0.92"/>
    <ellipse rx="7.5" ry="20" fill="#f4f4f5" transform="rotate(300)" opacity="0.92"/>

    <!-- Círculo negro central que crea el hueco de apertura -->
    <circle r="11" fill="#09090b"/>

    <!-- Pupila central blanca -->
    <circle r="5.5" fill="#f4f4f5"/>
    <circle r="2.5" fill="#09090b"/>

    <!-- Reflejo de lente -->
    <circle cx="2.5" cy="-3" r="1.2" fill="#ffffff" opacity="0.6"/>
  </g>
</svg>
